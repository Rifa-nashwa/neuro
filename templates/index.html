<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plant Disease Detector</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #060d0a;
      --surface: rgba(255,255,255,0.04);
      --surface-hover: rgba(255,255,255,0.07);
      --border: rgba(255,255,255,0.08);
      --border-active: rgba(52,211,120,0.4);
      --green: #22c97a;
      --green-dim: rgba(34,201,122,0.12);
      --green-glow: rgba(34,201,122,0.3);
      --text: #f0faf4;
      --text-muted: rgba(240,250,244,0.45);
      --text-faint: rgba(240,250,244,0.22);
      --amber: #f5a623;
      --red: #ef4444;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Background ── */
    .bg-scene {
      position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none;
    }
    .orb {
      position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.18;
      animation: drift 18s ease-in-out infinite;
    }
    .orb-1 { width: 600px; height: 600px; background: radial-gradient(circle, #22c97a, #0a6640); top: -200px; left: -150px; }
    .orb-2 { width: 450px; height: 450px; background: radial-gradient(circle, #5b4eed, #2d1bb5); bottom: -100px; right: -100px; animation-delay: -6s; }
    .orb-3 { width: 300px; height: 300px; background: radial-gradient(circle, #f472b6, #9b1a72); top: 45%; left: 55%; animation-delay: -12s; opacity: 0.12; }
    @keyframes drift {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(25px, -35px) scale(1.06); }
      66% { transform: translate(-18px, 22px) scale(0.94); }
    }

    /* grid texture */
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    /* ── Layout ── */
    .page { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem 1rem; }

    /* ── Nav ── */
    .nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 32px;
      background: rgba(6,13,10,0.7);
      backdrop-filter: blur(20px);
      border-bottom: 0.5px solid var(--border);
    }
    .nav-logo {
      display: flex; align-items: center; gap: 10px;
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; letter-spacing: -0.01em;
      color: var(--text);
    }
    .nav-icon {
      width: 32px; height: 32px; border-radius: 10px;
      background: linear-gradient(135deg, #22c97a, #0a7a48);
      display: flex; align-items: center; justify-content: center;
    }
    .nav-badge {
      font-size: 11px; padding: 3px 10px; border-radius: 20px;
      background: var(--green-dim); color: var(--green);
      border: 0.5px solid rgba(34,201,122,0.2);
      font-family: 'DM Sans', sans-serif; font-weight: 400;
    }

    /* ── Hero ── */
    .hero { text-align: center; margin-bottom: 2.5rem; padding-top: 4rem; }
    .hero-eyebrow {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--green); margin-bottom: 16px;
      padding: 5px 12px; border-radius: 20px;
      border: 0.5px solid rgba(34,201,122,0.25);
      background: var(--green-dim);
    }
    .pulse-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); animation: pulse-anim 2s ease-in-out infinite; }
    @keyframes pulse-anim { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.5; transform:scale(0.7); } }
    .hero h1 {
      font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: clamp(2.2rem, 5vw, 3.6rem); line-height: 1.08; letter-spacing: -0.03em;
      background: linear-gradient(135deg, #f0faf4 20%, #22c97a 60%, #6ee7b7 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 12px;
    }
    .hero p {
      font-size: 15px; color: var(--text-muted); max-width: 380px; margin: 0 auto;
      font-weight: 300; line-height: 1.6;
    }

    /* ── Card ── */
    .card {
      width: 100%; max-width: 480px;
      background: rgba(255,255,255,0.035);
      border: 0.5px solid var(--border);
      border-radius: 24px;
      padding: 2rem;
      backdrop-filter: blur(24px);
      box-shadow: 0 32px 64px rgba(0,0,0,0.4), inset 0 0.5px 0 rgba(255,255,255,0.08);
      animation: fadeUp 0.7s ease both;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(24px); }
      to { opacity:1; transform:translateY(0); }
    }

    /* ── Drop Zone ── */
    .drop-zone {
      border: 1.5px dashed rgba(34,201,122,0.25);
      border-radius: 16px; padding: 2.5rem 1rem;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      cursor: pointer; transition: all 0.25s ease;
      background: rgba(34,201,122,0.02);
      position: relative; overflow: hidden;
    }
    .drop-zone::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 50%, rgba(34,201,122,0.06) 0%, transparent 70%);
      opacity: 0; transition: opacity 0.3s;
    }
    .drop-zone:hover::before, .drop-zone.drag-over::before { opacity: 1; }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: rgba(34,201,122,0.55);
      background: rgba(34,201,122,0.04);
      transform: scale(1.005);
    }
    .drop-zone.has-file {
      border-style: solid; border-color: var(--green); padding: 1rem 1rem 0.6rem;
    }
    .upload-icon-wrap {
      width: 56px; height: 56px; border-radius: 16px;
      background: var(--green-dim); border: 0.5px solid rgba(34,201,122,0.2);
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.25s;
    }
    .drop-zone:hover .upload-icon-wrap { transform: translateY(-3px); }
    .drop-title { font-family: 'Syne', sans-serif; font-weight: 600; font-size: 14px; color: var(--text); }
    .drop-sub { font-size: 12px; color: var(--text-muted); }
    .drop-formats { display: flex; gap: 6px; }
    .fmt-tag {
      font-size: 10px; padding: 2px 8px; border-radius: 6px;
      background: rgba(255,255,255,0.05); border: 0.5px solid var(--border);
      color: var(--text-faint); font-family: 'DM Sans', sans-serif;
    }
    .file-name { font-size: 12px; color: var(--green); word-break: break-all; }

    /* ── Preview ── */
    .preview-wrap {
      display: none; position: relative; border-radius: 12px; overflow: hidden;
      border: 0.5px solid var(--border-active); margin-top: 0.75rem;
    }
    .preview-wrap.show { display: block; animation: fadeUp 0.35s ease; }
    .preview-wrap img { width: 100%; max-height: 220px; object-fit: cover; display: block; }
    .remove-btn {
      position: absolute; top: 8px; right: 8px;
      width: 28px; height: 28px; border-radius: 50%;
      background: rgba(0,0,0,0.6); border: none;
      color: rgba(255,255,255,0.8); font-size: 16px; line-height: 1;
      cursor: pointer; transition: background 0.2s; display: flex; align-items: center; justify-content: center;
    }
    .remove-btn:hover { background: rgba(239,68,68,0.7); }

    /* ── Submit ── */
    .submit-btn {
      width: 100%; margin-top: 1.25rem;
      padding: 0.9rem 1.5rem; border: none; border-radius: 14px;
      font-family: 'Syne', sans-serif; font-weight: 600; font-size: 15px; letter-spacing: 0.01em;
      color: #060d0a;
      background: linear-gradient(135deg, #6ee7b7, #22c97a, #0d9e62);
      cursor: pointer; transition: all 0.3s ease;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      position: relative; overflow: hidden;
    }
    .submit-btn::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      opacity: 0; transition: opacity 0.3s;
    }
    .submit-btn:hover:not(:disabled)::before { opacity: 1; }
    .submit-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px var(--green-glow);
    }
    .submit-btn:active:not(:disabled) { transform: translateY(0); }
    .submit-btn:disabled { opacity: 0.35; cursor: not-allowed; background: rgba(34,201,122,0.3); color: rgba(255,255,255,0.4); }
    .btn-arrow { transition: transform 0.3s; }
    .submit-btn:hover:not(:disabled) .btn-arrow { transform: translateX(4px); }

    /* ── Footer hint ── */
    .hint { margin-top: 1.5rem; text-align: center; font-size: 12px; color: var(--text-faint); }
    .hint span { color: var(--green); opacity: 0.7; }
  </style>
</head>
<body>

<div class="bg-scene">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<nav class="nav">
  <div class="nav-logo">
    <div class="nav-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M12 2C6.5 2 2 6.5 2 12c0 4.5 3 8.3 7 9.5.5-.5 1-1.2 1.5-2C7 18.5 4.5 15.5 4.5 12c0-4.1 3.4-7.5 7.5-7.5 1.5 0 3 .5 4.2 1.3.3-.7.7-1.3 1.1-1.8C15.5 2.7 13.8 2 12 2z" fill="white"/>
        <path d="M21 3s-1 1.5-1 4c0 3-2 6-5 7.5-1 .5-2 .8-3 .8V22c5.5-.5 10-5 10-10.5 0-3-.5-5.5-1-8.5z" fill="rgba(255,255,255,0.7)"/>
      </svg>
    </div>
    LeafScan
  </div>
  <div class="nav-badge">● Powered by AI</div>
</nav>

<div class="page">
  <div class="hero">
    <div class="hero-eyebrow"><div class="pulse-dot"></div> AI-powered detection</div>
    <h1>Diagnose your<br>plants instantly</h1>
    <p>Upload a leaf photo and get disease identification, severity analysis, and treatment recommendations in seconds.</p>
  </div>

  <div class="card">
    <form action="/predict" method="POST" enctype="multipart/form-data">
      <label class="drop-zone" id="dropZone" for="imageInput">
        <input type="file" id="imageInput" name="image" accept="image/*" required hidden>
        <div class="upload-icon-wrap">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M12 16V4m0 0L8 8m4-4l4 4" stroke="#22c97a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M3 16v1a4 4 0 004 4h10a4 4 0 004-4v-1" stroke="#22c97a" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="drop-title">Drop leaf image here</div>
        <div class="drop-sub">or click to browse files</div>
        <div class="drop-formats">
          <span class="fmt-tag">JPG</span>
          <span class="fmt-tag">PNG</span>
          <span class="fmt-tag">WEBP</span>
          <span class="fmt-tag">up to 10MB</span>
        </div>
        <div class="file-name" id="fileName"></div>

        <div class="preview-wrap" id="previewWrap">
          <img id="preview" alt="Leaf preview">
          <button type="button" class="remove-btn" id="removeBtn">✕</button>
        </div>
      </label>

      <button type="submit" class="submit-btn" id="submitBtn" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
          <path d="M16.5 16.5L21 21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M8 11h6M11 8v6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        Analyze Plant Disease
        <svg class="btn-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M5 12h14m-7-7l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </form>

    <div class="hint">Supports <span>38+ crop species</span> · <span>100+ disease types</span></div>
  </div>
</div>

<script>
  const dropZone = document.getElementById('dropZone');
  const input = document.getElementById('imageInput');
  const preview = document.getElementById('preview');
  const previewWrap = document.getElementById('previewWrap');
  const fileName = document.getElementById('fileName');
  const removeBtn = document.getElementById('removeBtn');
  const submitBtn = document.getElementById('submitBtn');

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault(); dropZone.classList.remove('drag-over');
    if (e.dataTransfer.files.length) { input.files = e.dataTransfer.files; handleFile(e.dataTransfer.files[0]); }
  });
  input.addEventListener('change', () => { if (input.files.length) handleFile(input.files[0]); });

  function handleFile(file) {
    if (!file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = e => {
      preview.src = e.target.result;
      previewWrap.classList.add('show');
      dropZone.classList.add('has-file');
      fileName.textContent = file.name;
      submitBtn.disabled = false;
    };
    reader.readAsDataURL(file);
  }

  removeBtn.addEventListener('click', e => {
    e.preventDefault(); e.stopPropagation();
    input.value = ''; preview.src = '';
    previewWrap.classList.remove('show');
    dropZone.classList.remove('has-file');
    fileName.textContent = ''; submitBtn.disabled = true;
  });
</script>
</body>
</html>
